name: Build Tokenizers ARM64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake rustc cargo pkg-config
        
    - name: Build tokenizers for ARM64
      run: |
        mkdir -p wheels
        pip install --upgrade pip wheel setuptools
        git clone https://github.com/huggingface/tokenizers
        cd tokenizers/bindings/python
        pip wheel . --wheel-dir=../../../wheels/
    
    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: tokenizers-arm64-wheel
        path: ./wheels/*.whl
